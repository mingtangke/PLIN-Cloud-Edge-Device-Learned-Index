<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">PLIN Cloud-Edge-Device Learned Index Overview</title>
  <desc id="desc">A three-layer architecture diagram showing the Cloud server, two Edge servers, ten End nodes, offline training, and the four-stage lookup path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#f7fff9"/>
      <stop offset="1" stop-color="#fff8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#18314f" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6fed"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#21885c"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <style>
      .title { font: 800 34px Inter, "Segoe UI", Arial, sans-serif; fill: #162033; }
      .subtitle { font: 500 17px Inter, "Segoe UI", Arial, sans-serif; fill: #536174; }
      .section { font: 800 19px Inter, "Segoe UI", Arial, sans-serif; fill: #1d2b40; }
      .label { font: 700 16px Inter, "Segoe UI", Arial, sans-serif; fill: #18263a; }
      .small { font: 500 13px Inter, "Segoe UI", Arial, sans-serif; fill: #536174; }
      .tiny { font: 600 11px Inter, "Segoe UI", Arial, sans-serif; fill: #5f6b7c; }
      .box { fill: white; stroke: #d8e1ee; stroke-width: 1.4; filter: url(#shadow); }
      .cloud { fill: #eef6ff; stroke: #8bbcff; }
      .edge { fill: #effcf5; stroke: #85d6ad; }
      .end { fill: #fff8e8; stroke: #f1c16d; }
      .data { fill: #f7f3ff; stroke: #c9b8ff; }
      .note { fill: #ffffff; stroke: #dde6f2; }
      .line-blue { stroke: #2f6fed; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .line-green { stroke: #21885c; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .line-orange { stroke: #d97706; stroke-width: 3; fill: none; marker-end: url(#arrow-orange); }
      .line-soft { stroke: #91a4b8; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow-blue); }
    </style>
  </defs>

  <rect width="1280" height="760" rx="28" fill="url(#bg)"/>

  <text class="title" x="54" y="58">PLIN Cloud-Edge-Device Learned Index</text>
  <text class="subtitle" x="56" y="86">Three-layer runtime: global LSTM hot-key push + Edge PLIN routing + End four-stage lookup</text>

  <rect class="box data" x="60" y="124" width="248" height="178" rx="18"/>
  <text class="section" x="84" y="160">📦 Offline Data</text>
  <text class="small" x="84" y="193">Data.txt</text>
  <text class="tiny" x="84" y="215">sorted key → payload table</text>
  <text class="small" x="84" y="247">workload_log.csv</text>
  <text class="tiny" x="84" y="269">timestamp, device, key position</text>

  <rect class="box data" x="60" y="340" width="248" height="172" rx="18"/>
  <text class="section" x="84" y="376">🧠 Training</text>
  <text class="small" x="84" y="410">hot_lstm/train.py</text>
  <text class="small" x="84" y="438">hot_lstm/export.py</text>
  <text class="tiny" x="84" y="466">TorchScript models:</text>
  <text class="tiny" x="84" y="488">cloud_lstm.pt, end_lstm_*.pt</text>

  <rect class="box cloud" x="426" y="112" width="428" height="172" rx="22"/>
  <text class="section" x="454" y="149">☁️ Cloud / src/cloud</text>
  <text class="label" x="454" y="182">cloud_server</text>
  <text class="small" x="454" y="210">Global LSTM predicts hot End ranges</text>
  <text class="small" x="454" y="236">Routes CROSS_EDGE_REQ between Edge servers</text>
  <text class="tiny" x="454" y="260">Msg: HOT_UPDATE, CROSS_EDGE_REQ, HEARTBEAT_ACK</text>

  <rect class="box edge" x="372" y="356" width="248" height="150" rx="20"/>
  <text class="section" x="396" y="392">🌿 Edge 1</text>
  <text class="label" x="396" y="422">src/edge/edge_server</text>
  <text class="small" x="396" y="450">PLIN for End 1-5</text>
  <text class="tiny" x="396" y="476">port 7101</text>

  <rect class="box edge" x="662" y="356" width="248" height="150" rx="20"/>
  <text class="section" x="686" y="392">🌿 Edge 2</text>
  <text class="label" x="686" y="422">src/edge/edge_server</text>
  <text class="small" x="686" y="450">PLIN for End 6-10</text>
  <text class="tiny" x="686" y="476">port 7102</text>

  <g>
    <rect class="box end" x="332" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="414" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="496" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="578" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="660" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="742" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="824" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="906" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="988" y="580" width="74" height="58" rx="15"/>
    <rect class="box end" x="1070" y="580" width="74" height="58" rx="15"/>
    <text class="label" x="354" y="616">E1</text>
    <text class="label" x="436" y="616">E2</text>
    <text class="label" x="518" y="616">E3</text>
    <text class="label" x="600" y="616">E4</text>
    <text class="label" x="682" y="616">E5</text>
    <text class="label" x="764" y="616">E6</text>
    <text class="label" x="846" y="616">E7</text>
    <text class="label" x="928" y="616">E8</text>
    <text class="label" x="1010" y="616">E9</text>
    <text class="label" x="1088" y="616">E10</text>
  </g>

  <rect class="box note" x="934" y="124" width="286" height="234" rx="18"/>
  <text class="section" x="960" y="160">🔎 Four-stage lookup</text>
  <text class="small" x="960" y="195">① Local B+ shard</text>
  <text class="small" x="960" y="226">② End hot cache</text>
  <text class="small" x="960" y="257">③ Same-Edge PLIN fetch</text>
  <text class="small" x="960" y="288">④ Cross-Edge via Cloud</text>
  <text class="tiny" x="960" y="326">All stages are measured by scripts/bench.sh</text>

  <path class="line-soft" d="M 308 202 C 356 198, 374 198, 426 198"/>
  <path class="line-soft" d="M 308 426 C 350 390, 374 226, 426 213"/>
  <path class="line-blue" d="M 640 284 C 608 324, 556 336, 512 356"/>
  <path class="line-blue" d="M 672 284 C 704 324, 748 336, 780 356"/>
  <path class="line-green" d="M 496 506 C 462 538, 408 552, 370 580"/>
  <path class="line-green" d="M 496 506 C 494 540, 526 554, 616 580"/>
  <path class="line-green" d="M 786 506 C 780 540, 784 554, 780 580"/>
  <path class="line-green" d="M 786 506 C 874 540, 1018 552, 1108 580"/>
  <path class="line-orange" d="M 910 430 C 966 412, 1050 380, 1064 358"/>
  <path class="line-orange" d="M 934 251 C 902 230, 884 216, 854 208"/>

  <text class="tiny" x="338" y="190">Data + workload</text>
  <text class="tiny" x="688" y="326">HOT_UPDATE</text>
  <text class="tiny" x="566" y="548">PLIN_PARAM_PUSH / EDGE_FETCH_REQ</text>
  <text class="tiny" x="938" y="398">CROSS_EDGE_REQ</text>

  <rect class="box note" x="60" y="574" width="218" height="96" rx="18"/>
  <text class="section" x="84" y="610">🛠️ Run</text>
  <text class="tiny" x="84" y="638">scripts/run_all.sh</text>
  <text class="tiny" x="84" y="660">scripts/bench.sh → CSV + MD</text>

  <text class="subtitle" x="54" y="724">Source: src/ · Models: hot_lstm/models/ · Reports: output/benchmark_3layer.md</text>
</svg>
