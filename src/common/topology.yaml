# Static topology for the 1-cloud / 2-edge / 10-end demo.
# Key ranges derived from Data.txt (9,999,999 rows, sorted by key).
# Each end holds exactly 1,000,000 rows. Boundaries:
#   End N key_hi = key at row N*1000000   (last  row of block N)
#   End N key_lo = key at row (N-1)*M+1  (first row of block N)
# _key_t = double (from parameters.h). All key values are large floats.
cloud:
  host: 127.0.0.1
  port: 7000

edges:
  - { id: 1, host: 127.0.0.1, port: 7101, ends: [1, 2, 3, 4, 5] }
  - { id: 2, host: 127.0.0.1, port: 7102, ends: [6, 7, 8, 9, 10] }

